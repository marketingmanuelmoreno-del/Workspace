
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace · Manuel Moreno</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'><rect width='44' height='44' rx='10' fill='%23000000'/><rect x='9' y='27' width='6' height='8' rx='1.5' fill='%23c9a96e' opacity='.4'/><rect x='19' y='19' width='6' height='16' rx='1.5' fill='%23c9a96e' opacity='.7'/><rect x='29' y='12' width='6' height='23' rx='1.5' fill='%23c9a96e'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000000;--surface:#111111;--border:#222222;--border-hi:rgba(60,60,60,.9);--text:#e8dcc8;--muted:#a09080;--dim:#6b5d4e;}
html,body{height:100%;min-height:100vh}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 35% at 8% 0%,rgba(201,169,110,.03) 0%,transparent 100%);pointer-events:none;z-index:0;}
.wrapper{max-width:1000px;width:100%;margin:0 auto;padding:48px 40px;position:relative;z-index:1;}
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:52px;animation:fadeUp .5s ease both;}
.clock-wrap{display:flex;align-items:baseline;line-height:1;}
.clock-h,.clock-m{font-family:'Lora',serif;font-size:68px;font-weight:400;letter-spacing:-3px;font-variant-numeric:tabular-nums;color:rgba(232,220,200,.8);line-height:.95;transition:color 2s ease;}
.clock-sep{font-size:58px;font-weight:200;color:rgba(255,255,255,.3);margin:0 3px 5px 2px;animation:colon-breathe 2s ease-in-out infinite;line-height:.95;}
@keyframes colon-breathe{0%,100%{opacity:1}50%{opacity:.25}}
.clock-s{font-size:14px;color:var(--dim);font-variant-numeric:tabular-nums;align-self:flex-end;margin-bottom:8px;margin-left:9px;}
.time-sub{margin-top:14px;display:flex;flex-direction:column;gap:5px;}
.greeting{font-size:22px;font-weight:500;color:var(--text);letter-spacing:-.3px;line-height:1.2;}
.date-str{font-size:12px;color:var(--muted);letter-spacing:.1px;}
.header-right{text-align:right;padding-bottom:6px;}
.workspace-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);font-weight:600;}
.workspace-name{font-size:16px;font-weight:600;color:var(--muted);letter-spacing:-.2px;margin-top:5px;}
.divider{height:1px;background:linear-gradient(90deg,var(--border) 0%,transparent 70%);margin-bottom:28px;}
.section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.app-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:40px;}
.app-card-add{position:relative;background:var(--surface);border:1px dashed rgba(255,255,255,.08);border-radius:14px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:180px;opacity:.35;transition:opacity .22s,border-color .22s;animation:fadeUp .5s .06s ease both;}
.app-card-add:hover{opacity:.55;border-color:rgba(255,255,255,.15);}
.add-icon{width:40px;height:40px;border-radius:10px;border:1px dashed var(--dim);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:20px;line-height:1;}
.add-label{font-size:12px;color:var(--dim);font-weight:500;}
.footer{display:flex;align-items:center;justify-content:space-between;padding-top:24px;border-top:1px solid var(--border);animation:fadeUp .5s .25s ease both;}
.footer-left{font-size:10px;color:var(--dim);letter-spacing:.3px;}
.footer-right{font-size:10px;color:var(--dim);letter-spacing:.2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:800px){.app-grid{grid-template-columns:repeat(2,1fr)}.wrapper{padding:48px 24px 40px}}
@media(max-width:500px){.app-grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start;gap:20px;margin-bottom:44px}}
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="time-block">
      <div class="clock-wrap">
        <span class="clock-h" id="clock-h">--</span>
        <span class="clock-sep">:</span>
        <span class="clock-m" id="clock-m">--</span>
        <span class="clock-s" id="clock-s">--</span>
      </div>
      <div class="time-sub">
        <div class="greeting" id="greeting">—</div>
        <div class="date-str" id="datestr">—</div>
      </div>
    </div>
    <div class="header-right">
      <div class="workspace-label">Workspace</div>
      <div class="workspace-name">Manuel Moreno</div>
    </div>
  </div>

  <div class="divider"></div>
  <div class="section-label">Aplicaciones</div>

  <div class="app-grid">
    <!-- AQUÍ VAN LAS APPS — se añaden una a una -->
    <div class="app-card-add">
      <div class="add-icon">+</div>
      <div class="add-label">Nueva app</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-left">0 apps · Workspace listo</div>
    <div class="footer-right" id="fecha"></div>
  </div>

</div>
<script>
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-h').textContent=h;
  document.getElementById('clock-m').textContent=m;
  document.getElementById('clock-s').textContent=s;
  const hr=now.getHours();
  let greet='Buenas noches';
  let color='rgba(232,220,200,.45)';
  if(hr>=5&&hr<12){greet='Buenos días';color='rgba(232,220,200,.9)';}
  else if(hr>=12&&hr<19){greet='Buenas tardes';color='rgba(232,220,200,.75)';}
  document.getElementById('greeting').textContent=greet+', Manuel.';
  document.getElementById('clock-h').style.color=color;
  document.getElementById('clock-m').style.color=color;
  const days=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const ds=days[now.getDay()];
  const dsC=ds.charAt(0).toUpperCase()+ds.slice(1);
  const str=`${dsC}, ${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;
  document.getElementById('datestr').textContent=str;
  document.getElementById('fecha').textContent=str;
}
updateClock();
setInterval(updateClock,1000);
</script>
</body>
</html>
